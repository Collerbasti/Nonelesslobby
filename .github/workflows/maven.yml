name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Install DecentHolograms API
      run: |
        curl -L -o DecentHolograms.jar \
          "https://github.com/DecentSoftware-eu/DecentHolograms/releases/download/2.9.8/DecentHolograms-2.9.8.jar"
        # Use a minimal POM with no transitive dependencies (provided scope – we only need this for compilation)
        cat > dhapi-pom.xml << 'POMEOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <project>
          <modelVersion>4.0.0</modelVersion>
          <groupId>eu.decentsoftware.holograms</groupId>
          <artifactId>DHAPI</artifactId>
          <version>2.9.8</version>
          <packaging>jar</packaging>
        </project>
        POMEOF
        mvn install:install-file \
          -Dfile=DecentHolograms.jar \
          -DpomFile=dhapi-pom.xml \
          -q
    - name: Build with Maven
      run: mvn -B package --file pom.xml
    - name: Upload plugin jar
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: plugin-jar
        path: target/*.jar
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
