name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install DecentHolograms API
        run: |
          curl -L -o DecentHolograms.jar \
            "https://github.com/DecentSoftware-eu/DecentHolograms/releases/download/2.9.8/DecentHolograms-2.9.8.jar"
          cat > dhapi-pom.xml << 'POMEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <project>
            <modelVersion>4.0.0</modelVersion>
            <groupId>eu.decentsoftware.holograms</groupId>
            <artifactId>DHAPI</artifactId>
            <version>2.9.8</version>
            <packaging>jar</packaging>
          </project>
          POMEOF
          mvn install:install-file -Dfile=DecentHolograms.jar -DpomFile=dhapi-pom.xml -q

      - name: Build with Maven
        run: mvn -B package -DskipTests --file pom.xml -Dantrun.skip=true

      - name: Upload plugin jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-jar
          path: target/NonelessLobby-3.1.jar
          if-no-files-found: warn

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install DecentHolograms API
        run: |
          curl -L -o DecentHolograms.jar \
            "https://github.com/DecentSoftware-eu/DecentHolograms/releases/download/2.9.8/DecentHolograms-2.9.8.jar"
          cat > dhapi-pom.xml << 'POMEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <project>
            <modelVersion>4.0.0</modelVersion>
            <groupId>eu.decentsoftware.holograms</groupId>
            <artifactId>DHAPI</artifactId>
            <version>2.9.8</version>
            <packaging>jar</packaging>
          </project>
          POMEOF
          mvn install:install-file -Dfile=DecentHolograms.jar -DpomFile=dhapi-pom.xml -q

      - name: Build with Maven (tests already passed in build job)
        run: mvn -B package -DskipTests --file pom.xml -Dantrun.skip=true

      # ── Upload via Nitrado File Server API ───────────────────────────────────
      - name: Upload JAR to Nitrado
        env:
          NITRADO_API_TOKEN: ${{ secrets.NITRADO_TOKEN }}
        run: |
          set -euo pipefail

          LOCAL_FILE_PATH="target/NonelessLobby-3.1.jar"
          REMOTE_FILE_NAME="NonelessLobby-3.1.jar"

          # Lokale Datei prüfen
          if [ ! -f "$LOCAL_FILE_PATH" ]; then
            echo "Fehler: Datei nicht gefunden: $LOCAL_FILE_PATH"
            exit 1
          fi
          echo "Datei: $LOCAL_FILE_PATH ($(stat -c%s "$LOCAL_FILE_PATH") bytes)"

          # Service-ID und Username automatisch ermitteln
          echo "Ermittle Service-ID..."
          services_response="$(curl -sS \
            "https://api.nitrado.net/services" \
            -H "Authorization: Bearer ${NITRADO_API_TOKEN}")"
          svc_status="$(echo "$services_response" | jq -r '.status // empty')"
          if [ "$svc_status" != "success" ]; then
            echo "Fehler beim Abrufen der Services:"
            echo "$services_response" | jq .
            exit 1
          fi
          SERVICE_ID="$(echo "$services_response" | jq -r '
            if (.data.services | type) == "array" then .data.services[0].id
            else (.data.services | to_entries[0].value.id)
            end // empty')"
          if [ -z "$SERVICE_ID" ] || [ "$SERVICE_ID" = "null" ]; then
            echo "Fehler: Konnte Service-ID nicht ermitteln. Antwort:"
            echo "$services_response" | jq .
            exit 1
          fi
          echo "Service-ID: $SERVICE_ID"

          echo "Ermittle Gameserver-Username..."
          gs_response="$(curl -sS \
            "https://api.nitrado.net/services/${SERVICE_ID}/gameservers" \
            -H "Authorization: Bearer ${NITRADO_API_TOKEN}")"
          gs_status="$(echo "$gs_response" | jq -r '.status // empty')"
          if [ "$gs_status" != "success" ]; then
            echo "Gameserver-Details fehlgeschlagen:"
            echo "$gs_response"
            exit 1
          fi
          USERNAME="$(echo "$gs_response" | jq -r '.data.gameserver.username')"
          echo "Username: $USERNAME"

          REMOTE_DIR="/games/${USERNAME}/ftproot/minecraftbukkit/plugins"
          echo "Zielverzeichnis: $REMOTE_DIR"

          # Schritt 1: Upload-Token holen
          echo "Hole Upload-Token..."
          token_response="$(curl -sS -X POST \
            "https://api.nitrado.net/services/${SERVICE_ID}/gameservers/file_server/upload" \
            -H "Authorization: Bearer ${NITRADO_API_TOKEN}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "path=${REMOTE_DIR}" \
            --data-urlencode "file=${REMOTE_FILE_NAME}")"

          status="$(echo "$token_response" | jq -r '.status // empty')"
          if [ "$status" != "success" ]; then
            echo "Upload-Token Anfrage fehlgeschlagen:"
            echo "$token_response"
            exit 1
          fi

          upload_url="$(echo "$token_response"   | jq -r '.data.token.url')"
          upload_token="$(echo "$token_response" | jq -r '.data.token.token')"
          echo "::add-mask::$upload_token"

          if [ -z "$upload_url" ] || [ "$upload_url" = "null" ] \
          || [ -z "$upload_token" ] || [ "$upload_token" = "null" ]; then
            echo "Keine Upload-URL oder Token in der Antwort:"
            echo "$token_response"
            exit 1
          fi

          echo "Upload-Token erhalten. Lade Datei hoch..."

          # Schritt 2: Datei als rohe Bytes hochladen
          upload_http_code="$(curl -sS -o /tmp/upload_response.txt -w "%{http_code}" -X POST "$upload_url" \
            -H "token: ${upload_token}" \
            -H "content-type: application/binary" \
            --data-binary "@${LOCAL_FILE_PATH}")"
          upload_response="$(cat /tmp/upload_response.txt)"
          echo "Upload HTTP-Status: $upload_http_code"
          echo "Upload-Antwort: $upload_response"

          if [ "$upload_http_code" -lt 200 ] || [ "$upload_http_code" -ge 300 ]; then
            echo "Datei-Upload fehlgeschlagen (HTTP $upload_http_code):"
            exit 1
          fi

          echo "✓ Upload erfolgreich: ${REMOTE_DIR}/${REMOTE_FILE_NAME}"
          echo "SERVICE_ID=$SERVICE_ID" >> "$GITHUB_ENV"

      # ── Server-Neustart mit Ankündigung via Nitrado API ─────────────────────
      - name: Announce restart and restart server via Nitrado API
        env:
          NITRADO_API_TOKEN: ${{ secrets.NITRADO_TOKEN }}
        run: |
          set -euo pipefail

          send_command() {
            local cmd="$1"
            curl -sS -X POST \
              "https://api.nitrado.net/services/${SERVICE_ID}/gameservers/app_server/command" \
              -H "Authorization: Bearer ${NITRADO_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"command\": \"$cmd\"}" > /dev/null
          }

          echo "Ankündigung: Neustart in 2 Minuten..."
          send_command "say Neustart in 2 Minuten wegen Plugin-Update!"

          sleep 90

          echo "Erinnerung: Neustart in 30 Sekunden..."
          send_command "say Neustart in 30 Sekunden!"

          sleep 30

          echo "Kicke alle Spieler..."
          send_command "kickall Server wird neugestartet – bitte gleich wieder einloggen!"

          echo "Starte Server neu..."
          response=$(curl -sS -X POST \
            "https://api.nitrado.net/services/${SERVICE_ID}/gameservers/restart" \
            -H "Authorization: Bearer ${NITRADO_API_TOKEN}" \
            -H "Content-Type: application/json")
          status="$(echo "$response" | jq -r '.status // empty')"
          if [ "$status" = "success" ]; then
            echo "✓ Server-Neustart ausgelöst"
          else
            echo "Neustart fehlgeschlagen:"
            echo "$response"
            exit 1
          fi
